<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 300px; padding: 14px; background: #0f0f17; color: #f1f1f3; margin:0; }
    .logo { width: 32px; height: 32px; margin-bottom: 6px; border-radius: 6px; }
    .header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    h3 { margin:0; font-size:15px; }
    .desc { font-size:12px; opacity:0.75; margin:0 0 10px; }
    button { background: #6d28d9; color: white; border: none; padding: 9px 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; font-size:13px; }
    button:hover { background: #5b21b6; }
    button:disabled { opacity: .6; }
    .status { font-size: 11px; margin-top: 8px; color: #a1a1aa; min-height: 14px; }
    .preview { margin: 8px 0; font-size:11px; background:#1a1a24; padding:6px 8px; border-radius:6px; border:1px solid #272733; display:none; }
    .preview.show { display:block; }
    .preview .title { font-weight:500; line-height:1.3; }
    .preview .meta { opacity:0.7; font-size:10px; margin-top:2px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-128.png" class="logo" alt="MediaBrain">
    <h3>MediaBrain</h3>
  </div>
  <p class="desc">一键保存当前标签页的视频</p>
  <button id="save-btn">保存视频到 MediaBrain</button>
  <div id="preview" class="preview"></div>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
